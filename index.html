<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>📚 My Book Site</title>

<!-- Open Graph -->
<meta property="og:title" content="📚 My Book Site">
<meta property="og:description" content="Myanmar Book Collection">
<meta property="og:image" content="https://via.placeholder.com/600x400">
<meta property="og:url" content="https://whispermmepub.github.io/book-site/">
<meta name="twitter:card" content="summary_large_image">

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0b1220;
  color:white;
}

header{
  background:#111827;
  padding:15px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
}

.search-box{
  padding:10px;
}

.search-box input{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:none;
  outline:none;
}

.container{
  padding:15px;
}

.book{
  background:#1f2937;
  padding:12px;
  margin-bottom:12px;
  border-radius:14px;
  box-shadow:0 4px 15px rgba(0,0,0,0.3);
}

.book img{
  width:100%;
  border-radius:10px;
  margin-bottom:10px;
}

.title{
  font-size:18px;
  font-weight:bold;
}

.author{
  font-size:13px;
  color:#9ca3af;
}

.desc{
  font-size:14px;
  margin-top:6px;
  color:#cbd5e1;
}

.btns{
  margin-top:10px;
  display:flex;
  gap:8px;
}

.btn{
  flex:1;
  text-align:center;
  padding:8px;
  border-radius:8px;
  text-decoration:none;
  color:white;
  font-size:14px;
}

.fb{background:#1877f2;}
.tg{background:#229ed9;}
.web{background:#10b981;}
</style>
</head>

<body>

<header>📚 My Book Site</header>

<div class="search-box">
  <input id="searchBox" type="text" placeholder="စာအုပ်ရှာရန်...">
</div>

<div class="container"></div>

<script>
let allBooks = [];

fetch('books.json')
.then(res => res.json())
.then(data => {
  allBooks = data;
  renderBooks(data);
});

function renderBooks(data){
  const container = document.querySelector('.container');
  container.innerHTML = "";

  data.forEach(book => {
    container.innerHTML += `
      <div class="book">
        <img src="${book.cover}">
        <div class="title">${book.title}</div>
        <div class="author">✍️ ${book.author}</div>
        <div class="desc">${book.desc}</div>

        <div class="btns">
          <a class="btn fb" href="${book.fb}" target="_blank">Facebook</a>
          <a class="btn tg" href="${book.tg}" target="_blank">Telegram</a>
          <a class="btn web" href="${book.web}" target="_blank">Link</a>
        </div>
      </div>
    `;
  });
}

document.getElementById("searchBox").addEventListener("input", function(){
  let value = this.value.toLowerCase();

  let filtered = allBooks.filter(book =>
    book.title.toLowerCase().includes(value) ||
    book.author.toLowerCase().includes(value)
  );

  renderBooks(filtered);
});
</script>

</body>
</html>
