<script>
fetch('books.json')
.then(res => res.json())
.then(data => {
  const container = document.querySelector('.container');
  container.innerHTML = "";

  data.forEach(book => {
    container.innerHTML += `
      <div class="book">

        <img src="${book.cover}" style="width:100%; border-radius:10px; margin-bottom:10px;">

        <div class="title">${book.title}</div>
        <div style="font-size:13px;color:#9ca3af;">✍️ ${book.author}</div>

        <div class="desc">${book.desc}</div>

        <div class="btns">
          <a class="btn fb" href="${book.fb}" target="_blank">Facebook</a>
          <a class="btn tg" href="${book.tg}" target="_blank">Telegram</a>
          <a class="btn web" href="${book.web}" target="_blank">Link</a>
        </div>

      </div>
    `;
  });
});
</script>
